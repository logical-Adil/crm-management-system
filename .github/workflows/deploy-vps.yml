name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/root/crm-management-system"
            REPO_URL="https://github.com/logical-Adil/crm-management-system.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            cd "$APP_DIR/server"
            npm ci
            npm run build
            npx prisma migrate deploy
            npm run prisma:seed

            corepack enable
            corepack prepare pnpm@latest --activate
            cd "$APP_DIR/client"
            pnpm install --frozen-lockfile
            pnpm exec next build --no-lint

            pm2 describe crm-api >/dev/null 2>&1 \
              && pm2 restart crm-api \
              || pm2 start "node dist/main.js" --name crm-api --cwd "$APP_DIR/server"

            pm2 describe crm-client >/dev/null 2>&1 \
              && pm2 restart crm-client \
              || pm2 start "pnpm start -p 3000" --name crm-client --cwd "$APP_DIR/client"

            pm2 save
            nginx -t
            systemctl reload nginx
